backend:
  name: git-gateway
  branch: main

# Proxy server untuk development lokal (jalankan: npx decap-server)
# local_backend: true

# Folder tempat gambar tersimpan di repo
media_folder: "assets/images/gallery"
# Path publik yang digunakan sebagai src di HTML
public_folder: "/assets/images/gallery"

# ── Pengaturan tampilan CMS ──
locale: id
site_url: https://orcaswimmingclub.com
logo_url: /assets/images/logo.png

collections:
  - name: "galeri"
    label: "📸 Galeri Foto Kegiatan"
    files:
      - file: "data/gallery.json"
        label: "Kelola Foto Galeri"
        name: "gallery"
        fields:
          - label: "Daftar Foto"
            name: "photos"
            widget: "list"
            label_singular: "Foto"
            summary: "{{fields.caption | ternary(fields.caption, 'Foto tanpa deskripsi')}}"
            fields:
              - label: "Upload Foto"
                name: "image"
                widget: "image"
                allow_multiple: false
                hint: "Format: JPG, PNG, WebP. Ukuran ideal: landscape 4:3 atau 16:9."
              - label: "Deskripsi Foto"
                name: "caption"
                widget: "string"
                required: false
                hint: "Opsional. Contoh: Latihan renang gaya bebas, Agustus 2025"
