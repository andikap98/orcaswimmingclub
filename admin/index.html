<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Panel — Orca Swimming Club</title>
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #38bdf8;
      --indigo: #6366f1;
      --bg: #0a0f1e;
      --bg2: #0d1a3a;
    }

    html, body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Loading Screen ── */
    #admin-loader {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      padding: 20px;
    }
    #admin-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loader-logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      margin-bottom: 18px;
      animation: pulse-logo 2s ease-in-out infinite;
    }
    @media (min-width: 480px) {
      .loader-logo { width: 80px; height: 80px; margin-bottom: 22px; }
    }
    @keyframes pulse-logo {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }

    .loader-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--blue), var(--indigo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }
    .loader-subtitle {
      font-size: clamp(0.75rem, 2.5vw, 0.88rem);
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .loader-bar {
      width: min(200px, 70vw);
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--indigo));
      border-radius: 99px;
      animation: load-bar 2s ease forwards;
    }
    @keyframes load-bar {
      0%  { width: 0%; }
      30% { width: 40%; }
      70% { width: 75%; }
      100% { width: 100%; }
    }

    /* ── Login Screen ── */
    #admin-login {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 16px;
      overflow-y: auto;
    }
    #admin-login.show { display: flex; }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: clamp(28px, 6vw, 52px) clamp(20px, 6vw, 44px);
      max-width: 420px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: card-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      margin: auto; /* centre on small screens */
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .login-logo {
      width: clamp(52px, 14vw, 68px);
      height: clamp(52px, 14vw, 68px);
      border-radius: 18px;
      margin: 0 auto 14px;
      display: block;
      box-shadow: 0 8px 32px rgba(56,189,248,0.3);
    }
    .login-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.5rem, 5vw, 1.9rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--blue), var(--indigo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .login-subtitle {
      font-size: clamp(0.8rem, 2.5vw, 0.88rem);
      color: rgba(255,255,255,0.5);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      color: rgba(255,255,255,0.2);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .btn-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--blue), var(--indigo));
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.88rem, 3vw, 0.97rem);
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      letter-spacing: 0.3px;
      /* ensure tap target ≥ 44px on mobile */
      min-height: 48px;
      touch-action: manipulation;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    }
    .btn-login:active { transform: translateY(0); opacity: 0.9; }

    .login-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      color: rgba(255,255,255,0.4);
      font-size: 0.82rem;
      text-decoration: none;
      transition: color 0.2s;
      touch-action: manipulation;
    }
    .login-back:hover { color: rgba(255,255,255,0.7); }

    .login-security-note {
      margin-top: 20px;
      padding: 12px 14px;
      background: rgba(56,189,248,0.07);
      border: 1px solid rgba(56,189,248,0.14);
      border-radius: 10px;
      font-size: clamp(0.73rem, 2.2vw, 0.78rem);
      color: rgba(56,189,248,0.7);
      display: flex;
      align-items: flex-start;
      gap: 8px;
      text-align: left;
    }
    .login-security-note svg { flex-shrink: 0; margin-top: 1px; }

    /* ── Error banner ── */
    #login-error {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px;
      font-size: 0.82rem;
      color: #fca5a5;
      text-align: left;
    }
    #login-error.show { display: block; }

    /* ── Decap CMS iframe fills full viewport on mobile ── */
    #nc-root iframe,
    .nc-app-wrapper {
      max-width: 100% !important;
    }

    /* Netlify Identity widget z-index fix */
    [data-netlify-identity-widget] {
      z-index: 99999 !important;
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="admin-loader">
    <img src="../assets/images/logo.png" alt="Orca Logo" class="loader-logo">
    <div class="loader-title">ORCA</div>
    <div class="loader-subtitle">Admin Panel</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <!-- Login Screen -->
  <div id="admin-login" role="main" aria-label="Login Admin">
    <div class="login-card">
      <img src="../assets/images/logo.png" alt="Orca Logo" class="login-logo">
      <div class="login-title">ORCA</div>
      <p class="login-subtitle">
        Masuk untuk mengelola galeri foto<br>
        <strong style="color:rgba(255,255,255,0.75)">Orca Swimming Club</strong>
      </p>
      <div class="login-divider">Autentikasi Diperlukan</div>

      <button class="btn-login" id="login-btn">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        Masuk ke Admin Panel
      </button>

      <div id="login-error" role="alert"></div>

      <div class="login-security-note">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        Halaman ini hanya untuk administrator. Akses tidak sah akan dicatat.
      </div>

      <a href="/" class="login-back">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Kembali ke website
      </a>
    </div>
  </div>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js"></script>

  <script>
    const loader      = document.getElementById('admin-loader');
    const loginScreen = document.getElementById('admin-login');
    const loginBtn    = document.getElementById('login-btn');
    const loginError  = document.getElementById('login-error');

    // Hide loader after bar animation
    function hideLoader() {
      setTimeout(() => loader.classList.add('hidden'), 2300);
    }

    // Show login screen helper
    function showLogin() {
      loginScreen.classList.add('show');
      // Scroll to top so card is fully visible on small screens
      window.scrollTo(0, 0);
    }

    // Hide login screen helper
    function hideLogin() {
      loginScreen.classList.remove('show');
      loginError.classList.remove('show');
    }

    // ── Open Netlify Identity widget reliably ──
    function openLoginWidget() {
      // Reset any error
      loginError.classList.remove('show');

      if (window.netlifyIdentity) {
        // Force the widget to open the login tab, not signup
        window.netlifyIdentity.open('login');
      }
    }

    loginBtn.addEventListener('click', openLoginWidget);
    // Also support tap on mobile (prevent double fire)
    loginBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      openLoginWidget();
    });

    // ── Identity events ──
    window.netlifyIdentity.on('init', user => {
      hideLoader();
      if (!user) {
        showLogin();
      }
      // If user exists, Decap CMS handles the UI automatically
    });

    window.netlifyIdentity.on('login', user => {
      hideLogin();
      // Let Decap CMS take over — no redirect needed
    });

    window.netlifyIdentity.on('logout', () => {
      // Reload the page cleanly so Decap CMS resets and login screen appears fresh
      window.location.replace(window.location.pathname);
    });

    window.netlifyIdentity.on('error', err => {
      console.error('Netlify Identity error:', err);
      // Show friendly error message
      loginError.textContent = '⚠️ Gagal terhubung: ' + (err.message || err);
      loginError.classList.add('show');
    });
  </script>

</body>
</html>
