<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Panel — Orca Swimming Club</title>
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0f1e;
      color: #fff;
      min-height: 100vh;
    }

    /* ── Loading Screen ── */
    #admin-loader {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a0f1e 0%, #0d1a3a 50%, #0a0f1e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #admin-loader.hidden { opacity: 0; visibility: hidden; }

    .loader-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      margin-bottom: 20px;
      animation: pulse-logo 2s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }

    .loader-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .loader-subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .loader-bar {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      border-radius: 99px;
      animation: load-bar 2s ease forwards;
    }
    @keyframes load-bar {
      0% { width: 0%; }
      30% { width: 40%; }
      70% { width: 75%; }
      100% { width: 100%; }
    }

    /* ── Login Screen ── */
    #admin-login {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a0f1e 0%, #0d1a3a 50%, #0a0f1e 100%);
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 20px;
    }
    #admin-login.show { display: flex; }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: card-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      margin: 0 auto 16px;
      display: block;
      box-shadow: 0 8px 32px rgba(56,189,248,0.3);
    }
    .login-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .login-subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.2);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .btn-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      letter-spacing: 0.3px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    }
    .btn-login:active { transform: translateY(0); }

    .login-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-back:hover { color: rgba(255,255,255,0.7); }

    .login-security-note {
      margin-top: 24px;
      padding: 12px 16px;
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.15);
      border-radius: 10px;
      font-size: 0.78rem;
      color: rgba(56,189,248,0.7);
      display: flex;
      align-items: flex-start;
      gap: 8px;
      text-align: left;
    }
    .login-security-note svg { flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="admin-loader">
    <img src="../assets/images/logo.png" alt="Orca Logo" class="loader-logo">
    <div class="loader-title">ORCA</div>
    <div class="loader-subtitle">Admin Panel</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <!-- Login Screen (tampil jika belum login) -->
  <div id="admin-login">
    <div class="login-card">
      <img src="../assets/images/logo.png" alt="Orca Logo" class="login-logo">
      <div class="login-title">ORCA</div>
      <p class="login-subtitle">
        Masuk untuk mengelola galeri foto<br>
        <strong style="color:rgba(255,255,255,0.7)">Orca Swimming Club</strong>
      </p>
      <div class="login-divider">Autentikasi Diperlukan</div>
      <button class="btn-login" id="login-btn" onclick="window.netlifyIdentity.open()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        Masuk ke Admin Panel
      </button>
      <div class="login-security-note">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        Halaman ini hanya untuk administrator. Akses tidak sah akan dicatat.
      </div>
      <a href="/" class="login-back">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Kembali ke website
      </a>
    </div>
  </div>

  <!-- Decap CMS will inject its UI here -->
  <script src="https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js"></script>

  <script>
    // ── Auth Flow ──
    const loader = document.getElementById('admin-loader');
    const loginScreen = document.getElementById('admin-login');

    function hideLoader() {
      setTimeout(() => {
        loader.classList.add('hidden');
      }, 2200); // wait for bar animation + a bit
    }

    window.netlifyIdentity.on('init', user => {
      hideLoader();
      if (!user) {
        // Not logged in — show login screen
        loginScreen.classList.add('show');
      }
      // If user exists, Decap CMS takes over automatically
    });

    window.netlifyIdentity.on('login', user => {
      loginScreen.classList.remove('show');
      document.location.href = '/admin/';
    });

    window.netlifyIdentity.on('logout', () => {
      loginScreen.classList.add('show');
    });
  </script>

</body>
</html>
