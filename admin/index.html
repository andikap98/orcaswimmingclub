<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Panel — Orca Swimming Club</title>
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
  <link href="config.yml" type="text/yaml" rel="cms-config-url">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #38bdf8; --indigo: #6366f1; --bg: #0a0f1e; --bg2: #0d1a3a; }

    body.login-mode {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    #login-screen.hidden { display: none; }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: clamp(28px, 6vw, 48px) clamp(20px, 6vw, 40px);
      max-width: 420px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: card-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      width: 64px; height: 64px;
      border-radius: 18px;
      margin: 0 auto 14px;
      display: block;
      box-shadow: 0 8px 32px rgba(56,189,248,0.3);
    }
    .login-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--blue), var(--indigo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.25); }

    .btn-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--blue), var(--indigo));
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 48px;
      margin-top: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    #login-error {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px;
      font-size: 0.82rem;
      color: #fca5a5;
      text-align: left;
    }
    #login-error.show { display: block; }

    .login-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      color: rgba(255,255,255,0.4);
      font-size: 0.82rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-back:hover { color: rgba(255,255,255,0.7); }

    .login-security-note {
      margin-top: 20px;
      padding: 12px 14px;
      background: rgba(56,189,248,0.07);
      border: 1px solid rgba(56,189,248,0.14);
      border-radius: 10px;
      font-size: 0.78rem;
      color: rgba(56,189,248,0.7);
      display: flex;
      align-items: flex-start;
      gap: 8px;
      text-align: left;
    }
  </style>
</head>
<body class="login-mode">

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-card">
      <img src="../assets/images/logo.png" alt="Orca Logo" class="login-logo">
      <div class="login-title">ORCA</div>
      <p class="login-subtitle">
        Masuk untuk mengelola website<br>
        <strong style="color:rgba(255,255,255,0.75)">Orca Swimming Club</strong>
      </p>

      <form id="login-form">
        <div class="form-group">
          <label for="admin-email">Email</label>
          <input type="email" id="admin-email" placeholder="admin@orcaswimmingclub.com" required>
        </div>
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn-login" id="login-btn">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Masuk ke Admin Panel
        </button>
      </form>

      <div id="login-error" role="alert"></div>

      <div class="login-security-note">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        Halaman ini hanya untuk administrator. Akses tidak sah akan dicatat.
      </div>

      <a href="/" class="login-back">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Kembali ke website
      </a>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const loginError = document.getElementById('login-error');

    // Selalu bersihkan token lama saat halaman dimuat
    // agar tidak ada sisa session dari OAuth sebelumnya
    localStorage.removeItem('decap-cms-user');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.remove('show');

      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="30 70"/></svg> Memverifikasi...';

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login gagal');
        }

        // Simpan auth token untuk Decap CMS
        localStorage.setItem('decap-cms-user', JSON.stringify({
          login: data.login,
          token: data.token,
          name: data.name,
          backendName: 'github'
        }));

        loadCMS();

      } catch (err) {
        loginError.textContent = '⚠️ ' + err.message;
        loginError.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg> Masuk ke Admin Panel';
      }
    });

    function loadCMS() {
      // Sembunyikan login, tampilkan CMS
      document.getElementById('login-screen').classList.add('hidden');
      document.body.classList.remove('login-mode');

      // Muat Decap CMS dari file lokal untuk menghindari blokir Tracking Prevention browser
      const script = document.createElement('script');
      script.src = 'decap-cms.js';
      document.body.appendChild(script);

      // Batasi upload foto maksimal 500KB
      const MAX_FILE_SIZE = 500 * 1024;
      const observer = new MutationObserver(() => {
        document.querySelectorAll('input[type="file"]:not([data-validated])').forEach(input => {
          input.setAttribute('data-validated', 'true');
          input.addEventListener('change', (e) => {
            const files = e.target.files;
            for (let i = 0; i < files.length; i++) {
              if (files[i].size > MAX_FILE_SIZE) {
                const sizeMB = (files[i].size / 1024).toFixed(0);
                alert(`⚠️ File "${files[i].name}" terlalu besar (${sizeMB}KB).\n\nMaksimal ukuran file: 500KB.\nSilakan kompres foto terlebih dahulu.`);
                e.target.value = '';
                return;
              }
            }
          });
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
    }
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
